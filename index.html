<!DOCTYPE html>
<html lang="ur">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>زکوٰۃ کیلکولیٹر - النصیحہ اکیڈمی</title>

<link rel="icon" href="https://raw.githubusercontent.com/AlnaseehaAcademy/ZAKAT/main/1.png">

<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400&display=swap" rel="stylesheet">

<style>

body{
font-family:'Noto Nastaliq Urdu',serif;
background:#f4f4f4;
margin:0;
padding:20px;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#27ae60;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1e874b;
}

.hidden{
display:none;
}

.result{
background:#eafaf1;
padding:15px;
border-radius:5px;
margin-top:15px;
font-weight:bold;
white-space:pre-line;
}

.contact-buttons{
margin-top:15px;
}

.contact-buttons a{
display:inline-block;
background:#27ae60;
color:white;
padding:10px 15px;
margin:5px;
border-radius:5px;
text-decoration:none;
}

.footer{
margin-top:25px;
font-size:14px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<img src="https://raw.githubusercontent.com/AlnaseehaAcademy/ZAKAT/main/1.png" width="100">

<h1>زکوٰۃ کیلکولیٹر</h1>
<h3>رمضان 2026</h3>

<div id="assetsSection">

<h2>موجودہ اثاثے</h2>

<label>سونے کی مالیت</label>
<input type="number" id="goldValue">

<label>چاندی کی مالیت</label>
<input type="number" id="silverValue">

<label>نقدی</label>
<input type="number" id="cash">

<label>بینک بیلنس</label>
<input type="number" id="bankBalance">

<label>ادھار دی گئی رقم</label>
<input type="number" id="loansGiven">

<label>انشورنس پالیسی</label>
<input type="number" id="insurance">

<label>غیر ملکی کرنسی / شیئرز</label>
<input type="number" id="foreignCurrency">

<label>سامان تجارت</label>
<input type="number" id="tradeStock">

<label>بیچنے کی نیت سے خریدی گئی جائیداد</label>
<input type="number" id="property">

<label>دیگر زائد اموال</label>
<input type="number" id="otherAssets">

<button onclick="showLiabilities()">اگلا</button>

</div>


<div id="liabilitiesSection" class="hidden">

<h2>قرضے اور اخراجات</h2>

<label>قرضہ</label>
<input type="number" id="loansTaken">

<label>غیر ادا شدہ مہر</label>
<input type="number" id="mehr">

<label>بجلی بل</label>
<input type="number" id="electricityBill">

<label>گیس بل</label>
<input type="number" id="gasBill">

<label>پانی بل</label>
<input type="number" id="waterBill">

<label>فون بل</label>
<input type="number" id="phoneBill">

<label>مکان کرایہ</label>
<input type="number" id="rentHouse">

<label>دکان کرایہ</label>
<input type="number" id="rentShop">

<label>گودام کرایہ</label>
<input type="number" id="rentWarehouse">

<label>تنخواہیں</label>
<input type="number" id="salaries">

<label>دیگر اخراجات</label>
<input type="number" id="otherLiabilities">

<button onclick="calculateZakat()">زکوٰۃ کا حساب لگائیں</button>

</div>


<div id="result" class="result hidden"></div>


<div id="feedback" class="hidden">

<button onclick="shareResult()">WhatsApp پر شیئر کریں</button>

<button onclick="downloadPDF()">PDF رپورٹ ڈاؤنلوڈ کریں</button>

<div class="contact-buttons">

<a href="tel:+919764878916">فون کریں</a>

<a href="https://wa.me/919764878916">WhatsApp</a>

</div>

<button onclick="goHome()">واپس جائیں</button>

</div>

<div class="footer">

النصیحہ اکیڈمی

</div>

</div>


<script>

const nisab=170000;

const assets=[
'goldValue','silverValue','cash','bankBalance','loansGiven',
'insurance','foreignCurrency','tradeStock','property','otherAssets'
];

const liabilities=[
'loansTaken','mehr','electricityBill','gasBill','waterBill',
'phoneBill','rentHouse','rentShop','rentWarehouse','salaries','otherLiabilities'
];

document.querySelectorAll("input").forEach(input=>{
input.value=localStorage.getItem(input.id)||"";
input.addEventListener("input",()=>{
localStorage.setItem(input.id,input.value);
});
});

function showLiabilities(){

document.getElementById("assetsSection").classList.add("hidden");
document.getElementById("liabilitiesSection").classList.remove("hidden");

window.scrollTo({top:0,behavior:'smooth'});

}

function calculateZakat(){

let totalAssets=assets.reduce((s,id)=>s+(parseFloat(document.getElementById(id).value)||0),0);

let totalLiabilities=liabilities.reduce((s,id)=>s+(parseFloat(document.getElementById(id).value)||0),0);

let net=totalAssets-totalLiabilities;

let zakat=net*0.025;

let text="";

if(net>=nisab){

text=`کل اثاثے: ${totalAssets.toLocaleString()} روپے

کل قرضے: ${totalLiabilities.toLocaleString()} روپے

قابلِ زکوٰۃ مال:
${net.toLocaleString()} روپے

واجب زکوٰۃ:
${zakat.toLocaleString()} روپے`;

}else{

let remain=nisab-net;

text=`آپ صاحب نصاب نہیں ہیں

نصاب تک پہنچنے کیلئے مزید

${remain.toLocaleString()} روپے درکار ہیں`;

}

document.getElementById("result").innerText=text;

document.getElementById("liabilitiesSection").classList.add("hidden");

document.getElementById("result").classList.remove("hidden");

document.getElementById("feedback").classList.remove("hidden");

}

function shareResult(){

let text=document.getElementById("result").innerText;

let url="https://wa.me/?text="+encodeURIComponent(text);

window.open(url);

}

function downloadPDF(){

let content=document.getElementById("result").innerText;

let win=window.open("","","width=600,height=600");

win.document.write("<h2>Zakat Report</h2>");

win.document.write("<pre>"+content+"</pre>");

win.print();

}

function goHome(){

document.getElementById("assetsSection").classList.remove("hidden");

document.getElementById("liabilitiesSection").classList.add("hidden");

document.getElementById("result").classList.add("hidden");

document.getElementById("feedback").classList.add("hidden");

window.scrollTo({top:0,behavior:'smooth'});

}

</script>

</body>
</html>
