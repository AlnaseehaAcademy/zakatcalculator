<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zakat Calculator | Al Naseeha Academy</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family: Arial;
background:#f4f4f4;
margin:0;
padding:0;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
color:#2c7a7b;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

button{
padding:12px;
width:95%;
background:#2c7a7b;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#205e5f;
}

.result{
font-size:22px;
margin-top:20px;
color:#333;
}

footer{
margin-top:20px;
font-size:14px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<h1>زکوٰۃ کیلکولیٹر</h1>

<p>اپنے اثاثے درج کریں</p>

<input type="number" id="cash" placeholder="نقد رقم">

<input type="number" id="gold" placeholder="سونے کی مالیت">

<input type="number" id="silver" placeholder="چاندی کی مالیت">

<input type="number" id="business" placeholder="کاروباری مال">

<input type="number" id="debts" placeholder="قرضہ">

<button onclick="calculateZakat()">زکوٰۃ حساب کریں</button>

<div class="result" id="result"></div>

<footer>

Al Naseeha Academy

</footer>

</div>

<script>

function calculateZakat(){

let cash = parseFloat(document.getElementById("cash").value) || 0;
let gold = parseFloat(document.getElementById("gold").value) || 0;
let silver = parseFloat(document.getElementById("silver").value) || 0;
let business = parseFloat(document.getElementById("business").value) || 0;
let debts = parseFloat(document.getElementById("debts").value) || 0;

let total = cash + gold + silver + business - debts;

let zakat = total * 0.025;

document.getElementById("result").innerHTML =
"واجب زکوٰۃ: " + zakat.toFixed(2);

}

</script>

</body>
</html>
